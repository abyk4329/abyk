export type CodeStructure = {
  digits: number[];
  digitCounts: Record<number, number>;
  repeatedDigits: number[];
  allSame: boolean;
  allDifferent: boolean;
  hasRepeats: boolean;
  type: 'master' | 'repeated' | 'diverse';
};
 
export function computeCodeStructure(wealthCode: number): CodeStructure {
  const digits = wealthCode
    .toString()
    .padStart(4, '0')
    .split('')
    .map((digit) => Number.parseInt(digit, 10));
 
  const digitCounts = digits.reduce<Record<number, number>>((acc, digit) => {
    acc[digit] = (acc[digit] ?? 0) + 1;
    return acc;
  }, {});
 
  const repeatedDigits = Object.entries(digitCounts)
    .filter(([, count]) => count > 1)
    .map(([digit]) => Number.parseInt(digit, 10));
 
  const uniqueDigitCount = new Set(digits).size;
  const allSame = uniqueDigitCount === 1;
  const hasRepeats = repeatedDigits.length > 0;
  const allDifferent = uniqueDigitCount === digits.length;
 
  const type: CodeStructure['type'] = allSame ? 'master' : hasRepeats ? 'repeated' : 'diverse';
 
  return {
    digits,
    digitCounts,
    repeatedDigits,
    allSame,
    allDifferent,
    hasRepeats,
    type,
  };
}
 
export type ReportableStructure = Pick<
  CodeStructure,
  'digits' | 'allSame' | 'allDifferent' | 'hasRepeats' | 'type'
>;
 
export function toReportableStructure(structure: CodeStructure): ReportableStructure {
  const { digits, allSame, allDifferent, hasRepeats, type } = structure;
  return { digits, allSame, allDifferent, hasRepeats, type };
}

import type { StructureType } from "@/data/structureTexts";
 
export function detectCodeStructure(code: string): StructureType {
   const digits = code.split("");
   const allSame = digits.every((d) => d === digits[0]);
   if (allSame) return "master";
 
   const counts: Record<string, number> = {};
   digits.forEach((d) => (counts[d] = (counts[d] ?? 0) + 1));
   const hasRepeat = Object.values(counts).some((n) => n >= 2);
   return hasRepeat ? "repeated" : "diverse";
 }

import { wealthCodeTexts, sectionTitles } from "../data/wealthCodeTexts";
import { codeApplication } from "@/data/codeStructures";
import { STRUCTURE_INTRO, STRUCTURE_COPY } from "@/data/structureTexts";

export function getWealthCodeText(key: string) {
  return wealthCodeTexts[key] ?? '';
}

export function getSectionTitle(key: string) {
  return sectionTitles[key] ?? '';
}

export function getCodeStructure(structureKey: string) {
  const structure = STRUCTURE_COPY[structureKey];

  if (!structure) {
    return null;
  }

  let text = '';

  text += `מבנה הקוד:\n`;
  text += `${STRUCTURE_INTRO}\n\n`;
  text += `${structure.title}\n`;
  text += `${structure.paragraph}\n\n`;

  return {
    ...structure,
    text,
  };
}

export function getCodeApplication(key: string) {
  return codeApplication[key] ?? null;
}

